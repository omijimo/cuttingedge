seed: 42

data:
  grid_resolution: 16
  chord_per: beat
  max_seq_len: 256
  train_split: 0.9
  data_dir: data/processed
  num_examples: 500

model:
  melody_vocab_size: 15
  chord_vocab_size: 86
  d_model: 256
  nhead: 8
  num_layers: 4
  dim_feedforward: 512
  dropout: 0.1
  max_seq_len: 256
  num_bar_positions: 16

training:
  batch_size: 32
  learning_rate: 0.001
  weight_decay: 0.0001
  epochs: 100
  patience: 15
  checkpoint_dir: outputs/checkpoints_bigger
  log_dir: outputs/logs_bigger
  
generation:
  default_pattern: bass_chord
  accomp_octave: 3
  velocity: 70

export:
  opset_version: 14
  output_dir: exports
